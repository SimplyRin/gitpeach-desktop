name: CI / Linux Build

on:
  push:
    branches:
      - development-linux
      - development-linux-snapstore
      - main
      - linux
      - 'linux-release-*'
    tags:
      - 'v*'
      - 'release-*.*.*-linux*'
  pull_request:
    branches:
      - development-linux
      - development-linux-snapstore
      - main
      - linux
      - 'linux-release-*'
  workflow_dispatch:
  workflow_call:
    inputs:
      repository:
        default: SimplyRin/desktop
        required: false
        type: string
      ref:
        required: true
        type: string
      upload-artifacts:
        default: false
        required: false
        type: boolean
      environment:
        type: string
        required: false

env:
  NODE_VERSION: 22.14.0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies (scripts disabled)
        run: |
          export SKIP_POSTINSTALL=1
          if ! yarn install --frozen-lockfile --ignore-engines --ignore-scripts --no-progress; then
            echo "Frozen lockfile failed, installing without frozen lock..."
            yarn install --ignore-engines --ignore-scripts --no-progress
          fi

          # Ensure essential type definitions are available
          if [ ! -d "node_modules/@types/node" ]; then
            echo "Installing @types/node..."
            yarn add @types/node --ignore-scripts --no-progress || true
          fi

      - name: Validate Electron version
        run: yarn validate-electron-version
        continue-on-error: true

      - name: Run linting
        run: yarn lint
        continue-on-error: true

      - name: Validate changelog
        run: yarn validate-changelog
        continue-on-error: true

      - name: Ensure clean working directory
        run: git diff --name-status --exit-code
        continue-on-error: true

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update

          # Install Git FIRST - critical for dugite functionality
          sudo apt-get install -y git

          # Install core development dependencies
          sudo apt-get install -y libsecret-1-dev libxss1 libnss3-dev

          # Install essential compression libraries (fixes libz.so missing error)
          sudo apt-get install -y \
            zlib1g \
            zlib1g-dev \
            libbz2-1.0 \
            libbz2-dev \
            liblzma5 \
            liblzma-dev \
            libzstd1 \
            libzstd-dev

          # Try to install libgconf-2-4, fallback to newer alternatives if not available
          sudo apt-get install -y libgconf-2-4 || {
            echo "libgconf-2-4 not available, installing alternatives..."
            sudo apt-get install -y libgconf2-dev || true
            sudo apt-get install -y gconf2 || true
          }

          # Install additional Electron dependencies
          sudo apt-get install -y \
            libgtk-3-dev \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            libasound2 || true

          # Install audio libraries for Electron applications
          sudo apt-get install -y libasound2-dev

          # Try to install newer audio packages, fallback to older if needed
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2 || true

          # Install additional runtime libraries for Electron
          sudo apt-get install -y \
            libfontconfig1 \
            libfreetype6 \
            libx11-6 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrender1 \
            libxcb1 \
            libxcb-dri3-0 \
            libxcb-xinerama0 \
            libxcb-randr0 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-icccm4 \
            libatspi2.0-0 \
            libdrm-common

          # Install build tools required for native modules
          sudo apt-get install -y python3 python3-pip build-essential

          # Install additional tools for electron-builder packaging
          sudo apt-get install -y fakeroot dpkg

          # Install snapcraft for snap packaging
          sudo snap install snapcraft --classic

          # Install node-gyp globally for native module compilation
          npm install -g node-gyp
        continue-on-error: true

      - name: Install dependencies
        run: |
          # Clean yarn cache to prevent manifest corruption
          echo "Cleaning yarn cache..."
          yarn cache clean

          # Install root dependencies
          echo "Installing root dependencies..."
          yarn install --frozen-lockfile --no-progress || yarn install --no-progress

          # Add resolutions to package.json to prevent version conflicts (but don't install electron-builder yet)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.resolutions = pkg.resolutions || {};
            pkg.resolutions['string-width'] = '^4.2.3';
            pkg.resolutions['yargs/string-width'] = '^4.2.3';
            pkg.resolutions['webpack'] = '^5.0.0';
            pkg.resolutions['**/webpack'] = '^5.0.0';
            pkg.resolutions['parallel-webpack/webpack'] = '^5.0.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          # Ensure @types/node is installed for TypeScript compilation
          echo "Installing @types/node for TypeScript support..."
          yarn add @types/node@^22 --dev --ignore-scripts || true

          # Install app dependencies
          echo "Installing app dependencies..."
          cd app && yarn install --frozen-lockfile --no-progress || yarn install --no-progress
          cd ..

          # Build vendor desktop-notifications with the skipLibCheck fix
          echo "Building vendor desktop-notifications module..."
          if [ -d "vendor/desktop-notifications" ]; then
            cd vendor/desktop-notifications
            yarn install || npm install || true
            # Ensure TypeScript config has skipLibCheck
            if [ -f "tsconfig.json" ]; then
              if ! grep -q "skipLibCheck" tsconfig.json; then
                echo "Adding skipLibCheck to vendor tsconfig.json..."
                node -e "
                  const fs = require('fs');
                  const tsconfig = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
                  tsconfig.compilerOptions = tsconfig.compilerOptions || {};
                  tsconfig.compilerOptions.skipLibCheck = true;
                  fs.writeFileSync('tsconfig.json', JSON.stringify(tsconfig, null, 2));
                " || true
              fi
            fi
            yarn run build || npm run build || true
            cd ../../
            
            # Create symlink in app/node_modules for webpack resolution
            echo "Creating symlink for webpack resolution..."
            mkdir -p app/node_modules
            cd app/node_modules
            rm -rf desktop-notifications
            ln -sf ../../vendor/desktop-notifications desktop-notifications
            cd ../../
          fi

          echo "Dependencies installed successfully"

      - name: Validate environment
        run: |
          echo "Environment validation:"
          node --version
          yarn --version
          git --version
          echo "Dependencies are ready"

      - name: Lint code
        run: yarn lint || true
        continue-on-error: true

      - name: Run tests
        run: |
          # Set Git environment for dugite
          export GIT_EXEC_PATH="$(git --exec-path 2>/dev/null || dirname "$(which git)")"
          export PATH="$GIT_EXEC_PATH:$PATH"
          echo "Git available at: $(which git)"

          # Run tests with basic setup
          echo "Running tests..."
          yarn test:setup || echo "Test setup failed, continuing..."
          yarn test:script || echo "Script tests failed, continuing..."
          yarn test:unit || echo "Unit tests failed, continuing..."
        continue-on-error: true

      - name: Build production app
        run: |
          echo "Building production application..."

          # Set environment variables
          export NODE_ENV=production
          export CI=true

          # Enable GitHub Releases for updates in production builds
          export USE_GITHUB_RELEASES=true
          export GITHUB_RELEASES_OWNER=SimplyRin
          export GITHUB_RELEASES_REPO=desktop

          # Verify Git is available for dugite
          echo "Git version: $(git --version)"
          echo "Git path: $(which git)"

          # Ensure vendor desktop-notifications is available for webpack
          if [ ! -L "app/node_modules/desktop-notifications" ]; then
            echo "Creating desktop-notifications symlink..."
            mkdir -p app/node_modules
            cd app/node_modules
            rm -rf desktop-notifications
            ln -sf ../../vendor/desktop-notifications desktop-notifications
            cd ../../
          fi

          # Clean any previous builds
          rm -rf out dist 2>/dev/null || true

          # Run production compilation (webpack) with warnings suppressed
          echo "Running webpack compilation..."
          SASS_SILENCE_DEPRECATIONS=* yarn compile:prod

          # Run production build (electron-packager)
          echo "Running electron packaging..."
          yarn build:prod
        env:
          NODE_ENV: production
          TS_NODE_TRANSPILE_ONLY: true
          SKIP_POSTINSTALL: 1
          CI: true
          USE_GITHUB_RELEASES: true
          GITHUB_RELEASES_OWNER: SimplyRin
          GITHUB_RELEASES_REPO: desktop
          SASS_SILENCE_DEPRECATIONS: "*"

      - name: Package Linux application
        run: |
          echo "Starting Linux packaging..."

          # Verify build artifacts exist
          if [ ! -d "out" ]; then
            echo "ERROR: Build artifacts missing (out directory not found)"
            exit 1
          fi

          # Set environment for dugite/Git
          export GIT_EXEC_PATH="$(git --exec-path 2>/dev/null || dirname "$(which git)")"
          export PATH="$GIT_EXEC_PATH:$PATH"
          echo "Git exec path: $GIT_EXEC_PATH"

          # Ensure system libraries are available for deb/snap packaging
          echo "Checking system library availability:"
          ldconfig -p | grep -E "(libz|zlib|libbz2|liblzma)" || echo "Some compression libraries may not be found"

          # Set library path to include system libraries for electron-builder
          export LD_LIBRARY_PATH="/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:/usr/lib:/lib:$LD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH set to: $LD_LIBRARY_PATH"

          # Check current dist structure
          echo "Current dist content before packaging:"
          ls -la dist/ || echo "No dist directory yet"

          # Verify the packaged electron app exists (check both possible names)
          echo "Checking packaged app structure:"
          if [ -d "dist/rin-gitpeach-desktop-linux-x64/" ]; then
            echo "Found rin-gitpeach-desktop-linux-x64 directory"
            ls -la "dist/rin-gitpeach-desktop-linux-x64/"
          elif [ -d "dist/github-desktop-linux-x64/" ]; then
            echo "Found github-desktop-linux-x64 directory (old naming)"
            ls -la "dist/github-desktop-linux-x64/"
          else
            echo "Packaged app directory not found, listing all contents:"
            ls -la dist/
          fi

          # Fix electron-builder yargs dependency chain issue
          echo "Fixing electron-builder dependency conflicts..."

          # First, ensure we have the correct resolutions in package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.resolutions = pkg.resolutions || {};
            pkg.resolutions['electron-builder'] = '25.1.8';
            pkg.resolutions['**/electron-builder'] = '25.1.8';
            pkg.resolutions['string-width'] = '^4.2.3';
            pkg.resolutions['**/string-width'] = '^4.2.3';
            pkg.resolutions['yargs/string-width'] = '^4.2.3';
            pkg.resolutions['cliui/string-width'] = '^4.2.3';
            pkg.resolutions['wrap-ansi'] = '^7.0.0';
            pkg.resolutions['**/wrap-ansi'] = '^7.0.0';
            pkg.resolutions['webpack'] = '^5.0.0';
            pkg.resolutions['**/webpack'] = '^5.0.0';
            pkg.resolutions['parallel-webpack/webpack'] = '^5.0.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          # Install dependencies using npm instead of yarn for electron-builder (avoids manifest corruption)
          echo "Installing electron-builder and dependencies with npm..."

          # Remove any existing node_modules/.bin entries for electron-builder
          rm -rf node_modules/.bin/electron-builder* || true

          # Use npm to install electron-builder to avoid yarn cache corruption
          npm install electron-builder@25.1.8 string-width@^4.2.3 --save-dev --exact --no-audit --no-fund || {
            echo "npm install failed, trying with --force"
            npm install electron-builder@25.1.8 string-width@^4.2.3 --save-dev --exact --force --no-audit --no-fund
          }

          # Verify packages are installed correctly
          echo "Verifying installation..."
          npm list electron-builder || echo "electron-builder not found in npm list"

          # Verify string-width is available
          echo "Checking string-width availability..."
          node -e "try { require('string-width'); console.log('string-width found'); } catch(e) { console.log('string-width missing:', e.message); }"

          # Verify electron-builder version and dependencies
          echo "Verifying electron-builder version..."
          npm list electron-builder || true

          # Check electron-builder binary and make sure it's accessible
          echo "Checking electron-builder binary..."
          if [ -f "node_modules/.bin/electron-builder" ]; then
            echo "electron-builder binary found"
            # Test with a simple version check
            NODE_PATH=./node_modules node_modules/.bin/electron-builder --version || {
              echo "Version check failed, trying npx as fallback"
              # If version check fails, use npx as fallback
              echo "Using npx electron-builder as fallback..."
              npx electron-builder --version || {
                echo "npx also failed, trying global npm install"
                npm install -g electron-builder@25.1.8 --force
              }
            }
          else
            echo "electron-builder binary not found, installing globally with npm"
            npm install -g electron-builder@25.1.8 --force
          fi          # Package using the TypeScript script (this will build x64 only)
          echo "Running packaging script..."

          # Remove cross-compilation environment variables (ARM64 not needed)
          # Set target architecture environment for x64 only
          export TARGET_ARCH=x64
          export ELECTRON_BUILDER_ARCH=x64

          if NODE_ENV=production yarn ts-node --transpile-only -P script/tsconfig.json script/package.ts; then
            echo "TypeScript packaging succeeded"
          else
            echo "TypeScript execution failed, trying electron-builder directly..."
            
            # Determine which packaged directory exists
            PACKAGED_DIR=""
            if [ -d "dist/rin-gitpeach-desktop-linux-x64" ]; then
              PACKAGED_DIR="dist/rin-gitpeach-desktop-linux-x64"
            elif [ -d "dist/github-desktop-linux-x64" ]; then
              PACKAGED_DIR="dist/github-desktop-linux-x64"
            else
              echo "ERROR: No packaged directory found"
              ls -la dist/
              exit 1
            fi
            
            echo "Using packaged directory: $PACKAGED_DIR"
            
            # Determine electron-builder command (prefer local npm install over yarn)
            if [ -f "node_modules/.bin/electron-builder" ]; then
              ELECTRON_BUILDER_CMD="NODE_PATH=./node_modules ./node_modules/.bin/electron-builder"
            elif command -v npx >/dev/null 2>&1; then
              ELECTRON_BUILDER_CMD="NODE_PATH=./node_modules npx electron-builder"
            elif command -v electron-builder >/dev/null 2>&1; then
              ELECTRON_BUILDER_CMD="electron-builder"
            else
              echo "ERROR: electron-builder not found anywhere"
              exit 1
            fi
            
            echo "Using electron-builder command: $ELECTRON_BUILDER_CMD"
            
            echo "Building packages with electron-builder..."
            echo "Current working directory: $(pwd)"
            echo "Config file exists: $(ls -la script/electron-builder-linux.yml || echo 'Config not found')"
            
            # Build packages for Ubuntu Store (.deb and .snap only, no .rpm)
            echo "Building deb packages..."
            $ELECTRON_BUILDER_CMD --linux deb --x64 --prepackaged "$PACKAGED_DIR" --config script/electron-builder-linux.yml --publish=never || echo "deb build failed"
            
            echo "Building snap packages for Ubuntu Store..."
            $ELECTRON_BUILDER_CMD --linux snap --x64 --prepackaged "$PACKAGED_DIR" --config script/electron-builder-linux.yml --publish=never || echo "snap build failed"
            
            echo "Packaging completed"
          fi

          # Verify packages were created and check sizes  
          echo "Packaging completed. Generated files:"
          ls -lha dist/ || echo "No dist files found"

          # List all files recursively to debug
          echo "All files in dist directory:"
          find dist/ -type f -name "*" 2>/dev/null || echo "Could not list dist files"

          # Check for specific package types (only .deb and .snap for Ubuntu Store)
          echo "Looking for specific package types:"
          echo "DEB files: $(find dist/ -name "*.deb" 2>/dev/null | wc -l)"
          echo "SNAP files: $(find dist/ -name "*.snap" 2>/dev/null | wc -l)"

          # Show actual package files found
          echo "Package files found:"
          find dist/ -name "*.deb" -o -name "*.snap" 2>/dev/null || echo "No package files found"

          # Verify architecture of generated binaries
          echo "Verifying binary architectures..."
          for f in dist/*.{deb,snap}; do
            if [ -f "$f" ]; then
              echo "Checking $f:"
              file "$f" || true
            fi
          done

          # Size sanity check - packages should be > 100MB
          for f in dist/*.{deb,snap}; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo "0")
              size_mb=$((size / 1024 / 1024))
              echo "Package $f: ${size_mb}MB"
              if [ "$size_mb" -lt 100 ]; then
                echo "WARNING: Package $f is only ${size_mb}MB, which seems too small!"
              fi
            fi
          done
        env:
          NODE_ENV: production
          SKIP_POSTINSTALL: 1

      - name: Upload Linux packages (deb and snap for Ubuntu Store)
        uses: actions/upload-artifact@v4
        if:
          ${{ inputs.upload-artifacts != false || github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' }}
        with:
          name: rin-gitpeach-desktop-linux-x64-packages
          path: |
            dist/*.deb
            dist/*.snap
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        if:
          ${{ inputs.upload-artifacts != false || github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' }}
        with:
          name: rin-gitpeach-desktop-linux-checksums
          path: |
            dist/*.sha256
            dist/checksums.txt
          retention-days: 30
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [lint, build-linux]
    runs-on: ubuntu-latest
    if:
      ${{ github.event_name == 'push' || github.event_name ==
      'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist-artifacts

      - name: Display downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find ./dist-artifacts -type f -ls

      - name: Set version and build number
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Release from tag
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "RELEASE_TAG=v${VERSION}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Git Peach Desktop v${VERSION}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            # Development build
            SHORT_SHA=$(git rev-parse --short HEAD)
            BUILD_NUMBER="${{ github.run_number }}"
            VERSION="dev-build-${BUILD_NUMBER}-${SHORT_SHA}"
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "RELEASE_TAG=dev-${BUILD_NUMBER}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=Git Peach Desktop (Development Build #${BUILD_NUMBER})" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
          echo "Building release for version: ${VERSION}"

      - name: Calculate checksums
        run: |
          cd dist-artifacts
          echo "# Checksums for Git Peach Desktop ${{ steps.vars.outputs.VERSION }}" > checksums.md
          echo "" >> checksums.md
          echo "| File | Architecture | MD5 | SHA256 |" >> checksums.md
          echo "|------|--------------|-----|--------|" >> checksums.md

          # Process all files and detect architecture from filename
          for dir in */; do
            cd "$dir" 2>/dev/null || continue
            for file in *.{deb,snap}; do
              if [ -f "$file" ]; then
                original_filename=$(basename "$file")
                display_filename="$original_filename"
                
                md5_hash=$(md5sum "$file" | cut -d ' ' -f 1)
                sha256_hash=$(sha256sum "$file" | cut -d ' ' -f 1)
                
                # Detect architecture from filename (x64 only)
                if [[ "$display_filename" == *"amd64"* ]] || [[ "$display_filename" == *"x86_64"* ]]; then
                  arch="x64"
                else
                  arch="x64"  # Default to x64 since we only build x64 now
                fi
                
                echo "| [$display_filename](https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.RELEASE_TAG }}/$display_filename) | $arch | \`$md5_hash\` | \`$sha256_hash\` |" >> ../checksums.md
              fi
            done
            cd ..
          done

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.vars.outputs.RELEASE_TAG }}
          release_name: ${{ steps.vars.outputs.RELEASE_NAME }}
          draft: false
          prerelease: ${{ steps.vars.outputs.IS_PRERELEASE }}
          body: |
            Git Peach Desktop ${{ steps.vars.outputs.VERSION }}

            This release includes packages for x64 architecture only.

            ## Installation

            ### Debian/Ubuntu (.deb)
            Download the .deb file for x64:
            - **x64**: RinGitPeachDesktop-*-amd64.deb

            Install with:
            ```bash
            sudo apt install ./RinGitPeachDesktop-*.deb
            ```

            ### Ubuntu Snap (.snap)
            Download the .snap file for x64:
            - **x64**: RinGitPeachDesktop-*-amd64.snap

            Install with:
            ```bash
            sudo snap install ./RinGitPeachDesktop-*.snap --dangerous
            ```

            Or install directly from Ubuntu Store (once published):
            ```bash
            sudo snap install rin-gitpeach-desktop
            ```

            ## Architecture Detection
            To determine your system architecture, run:
            ```bash
            uname -m
            ```
            - `x86_64` or `amd64` → use x64 packages

      - name: Find and upload release assets
        run: |
          cd dist-artifacts

          # Find all package files (deb and snap)
          find . -name "*.deb" -o -name "*.snap" | while read file; do
            if [ -f "$file" ]; then
              original_name=$(basename "$file")
              asset_name="$original_name"
              
              echo "Uploading: $original_name"
              
              # Determine content type
              case "$asset_name" in
                *.deb)
                  content_type="application/vnd.debian.binary-package"
                  ;;
                *.snap)
                  content_type="application/vnd.snap"
                  ;;
                *)
                  content_type="application/octet-stream"
                  ;;
              esac
              
              # Upload using GitHub CLI (more reliable than actions)
              if command -v gh >/dev/null 2>&1; then
                gh release upload "${{ steps.vars.outputs.RELEASE_TAG }}" "$file" --clobber || true
              else
                echo "GitHub CLI not available, asset upload may fail"
              fi
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload checksums to release
        if: hashFiles('./dist-artifacts/checksums.md')
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh release upload "${{ steps.vars.outputs.RELEASE_TAG }}" "./dist-artifacts/checksums.md" --clobber || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
