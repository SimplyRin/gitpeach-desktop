name: CI / Linux Build

on:
  push:
    branches:
      - development-linux
      - main
      - linux
      - 'linux-release-*'
    tags:
      - 'v*'
      - 'release-*.*.*-linux*'
  pull_request:
    branches:
      - development-linux
      - main
      - linux
      - 'linux-release-*'
  workflow_dispatch:
  workflow_call:
    inputs:
      repository:
        default: SimplyRin/desktop
        required: false
        type: string
      ref:
        required: true
        type: string
      upload-artifacts:
        default: false
        required: false
        type: boolean
      environment:
        type: string
        required: false

env:
  NODE_VERSION: 22.14.0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies (scripts disabled)
        run: |
          export SKIP_POSTINSTALL=1
          if ! yarn install --frozen-lockfile --ignore-engines --ignore-scripts --no-progress; then
            echo "Frozen lockfile failed, installing without frozen lock..."
            yarn install --ignore-engines --ignore-scripts --no-progress
          fi

          # Ensure essential type definitions are available
          if [ ! -d "node_modules/@types/node" ]; then
            echo "Installing @types/node..."
            yarn add @types/node --ignore-scripts --no-progress || true
          fi

      - name: Validate Electron version
        run: yarn validate-electron-version
        continue-on-error: true

      - name: Run linting
        run: yarn lint
        continue-on-error: true

      - name: Validate changelog
        run: yarn validate-changelog
        continue-on-error: true

      - name: Ensure clean working directory
        run: git diff --name-status --exit-code
        continue-on-error: true

  build-linux:
    name: Build Linux Packages (x64 + ARM64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update

          # Install Git FIRST - critical for dugite functionality
          sudo apt-get install -y git

          # Install core development dependencies
          sudo apt-get install -y libsecret-1-dev libxss1 libnss3-dev

          # Install essential compression libraries (fixes libz.so missing error)
          sudo apt-get install -y \
            zlib1g \
            zlib1g-dev \
            libbz2-1.0 \
            libbz2-dev \
            liblzma5 \
            liblzma-dev \
            libzstd1 \
            libzstd-dev

          # Try to install libgconf-2-4, fallback to newer alternatives if not available
          sudo apt-get install -y libgconf-2-4 || {
            echo "libgconf-2-4 not available, installing alternatives..."
            sudo apt-get install -y libgconf2-dev || true
            sudo apt-get install -y gconf2 || true
          }

          # Install additional Electron dependencies
          sudo apt-get install -y \
            libgtk-3-dev \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libxss1 \
            libasound2 || true

          # Install audio libraries for Electron applications
          sudo apt-get install -y libasound2-dev

          # Try to install newer audio packages, fallback to older if needed
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2 || true

          # Install additional runtime libraries that AppImage might need
          sudo apt-get install -y \
            libfontconfig1 \
            libfreetype6 \
            libx11-6 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrender1 \
            libxcb1 \
            libxcb-dri3-0 \
            libxcb-xinerama0 \
            libxcb-randr0 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-icccm4 \
            libatspi2.0-0 \
            libdrm-common

          # Install build tools required for native modules
          sudo apt-get install -y python3 python3-pip build-essential

          # Install additional tools for electron-builder packaging
          sudo apt-get install -y fakeroot dpkg rpm

          # Install ARM64 cross-compilation tools for electron-builder
          echo "Installing ARM64 cross-compilation tools..."
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

          # Install qemu for ARM64 emulation and testing
          sudo apt-get install -y qemu-user-static binfmt-support

          # Install ARM64 libraries for cross-compilation
          echo "Installing ARM64 libraries for AppImage..."
          sudo apt-get install -y \
            zlib1g:arm64 \
            libbz2-1.0:arm64 \
            liblzma5:arm64 \
            libzstd1:arm64 \
            libsecret-1-0:arm64 \
            libxss1:arm64 \
            libnss3:arm64 \
            libasound2:arm64 || echo "Some ARM64 libraries may not be available"

          # Enable multi-arch support for ARM64 packages
          sudo dpkg --add-architecture arm64 || echo "Multi-arch already enabled or failed"
          sudo apt-get update || echo "Update after adding architecture failed"
          
          # Try to install ARM64 libraries again after enabling multi-arch
          sudo apt-get install -y \
            zlib1g:arm64 \
            libbz2-1.0:arm64 \
            liblzma5:arm64 \
            libzstd1:arm64 || echo "ARM64 libraries installation failed, will use system defaults"

          # Install node-gyp globally for native module compilation
          npm install -g node-gyp

      - name: Install dependencies
        run: |
          # Install root dependencies
          echo "Installing root dependencies..."
          yarn install --frozen-lockfile --no-progress || yarn install --no-progress

          # Ensure @types/node is installed for TypeScript compilation
          echo "Installing @types/node for TypeScript support..."
          yarn add @types/node@^22 --dev --ignore-scripts || true

          # Install app dependencies
          echo "Installing app dependencies..."
          cd app && yarn install --frozen-lockfile --no-progress || yarn install --no-progress
          cd ..

          # Build vendor desktop-notifications with the skipLibCheck fix
          echo "Building vendor desktop-notifications module..."
          if [ -d "vendor/desktop-notifications" ]; then
            cd vendor/desktop-notifications
            yarn install || npm install || true
            # Ensure TypeScript config has skipLibCheck
            if [ -f "tsconfig.json" ]; then
              if ! grep -q "skipLibCheck" tsconfig.json; then
                echo "Adding skipLibCheck to vendor tsconfig.json..."
                node -e "
                  const fs = require('fs');
                  const tsconfig = JSON.parse(fs.readFileSync('tsconfig.json', 'utf8'));
                  tsconfig.compilerOptions = tsconfig.compilerOptions || {};
                  tsconfig.compilerOptions.skipLibCheck = true;
                  fs.writeFileSync('tsconfig.json', JSON.stringify(tsconfig, null, 2));
                " || true
              fi
            fi
            yarn run build || npm run build || true
            cd ../../
            
            # Create symlink in app/node_modules for webpack resolution
            echo "Creating symlink for webpack resolution..."
            mkdir -p app/node_modules
            cd app/node_modules
            rm -rf desktop-notifications
            ln -sf ../../vendor/desktop-notifications desktop-notifications
            cd ../../
          fi

          echo "Dependencies installed successfully"

      - name: Validate environment
        run: |
          echo "Environment validation:"
          node --version
          yarn --version
          git --version
          echo "Dependencies are ready"

      - name: Lint code
        run: yarn lint || true
        continue-on-error: true

      - name: Run tests
        run: |
          # Set Git environment for dugite
          export GIT_EXEC_PATH="$(git --exec-path 2>/dev/null || dirname "$(which git)")"
          export PATH="$GIT_EXEC_PATH:$PATH"
          echo "Git available at: $(which git)"

          # Run tests with basic setup
          echo "Running tests..."
          yarn test:setup || echo "Test setup failed, continuing..."
          yarn test:script || echo "Script tests failed, continuing..."
          yarn test:unit || echo "Unit tests failed, continuing..."
        continue-on-error: true

      - name: Build production app
        run: |
          echo "Building production application..."

          # Set environment variables
          export NODE_ENV=production
          export CI=true

          # Verify Git is available for dugite
          echo "Git version: $(git --version)"
          echo "Git path: $(which git)"

          # Ensure vendor desktop-notifications is available for webpack
          if [ ! -L "app/node_modules/desktop-notifications" ]; then
            echo "Creating desktop-notifications symlink..."
            mkdir -p app/node_modules
            cd app/node_modules
            rm -rf desktop-notifications
            ln -sf ../../vendor/desktop-notifications desktop-notifications
            cd ../../
          fi

          # Clean any previous builds
          rm -rf out dist 2>/dev/null || true

          # Run production compilation (webpack)
          echo "Running webpack compilation..."
          yarn compile:prod

          # Run production build (electron-packager)
          echo "Running electron packaging..."
          yarn build:prod
        env:
          NODE_ENV: production
          TS_NODE_TRANSPILE_ONLY: true
          SKIP_POSTINSTALL: 1
          CI: true

      - name: Package Linux application
        run: |
          echo "Starting Linux packaging..."

          # Verify build artifacts exist
          if [ ! -d "out" ]; then
            echo "ERROR: Build artifacts missing (out directory not found)"
            exit 1
          fi

          # Set environment for dugite/Git
          export GIT_EXEC_PATH="$(git --exec-path 2>/dev/null || dirname "$(which git)")"
          export PATH="$GIT_EXEC_PATH:$PATH"
          echo "Git exec path: $GIT_EXEC_PATH"

          # Ensure system libraries are available for AppImage bundling
          echo "Checking system library availability for AppImage:"
          ldconfig -p | grep -E "(libz|zlib|libbz2|liblzma)" || echo "Some compression libraries may not be found"
          
          # Additional ARM64 library setup for AppImage
          echo "Setting up ARM64 libraries for AppImage packaging..."
          if [ -d "/usr/lib/aarch64-linux-gnu" ]; then
            echo "ARM64 library directory found, ensuring library availability..."
            sudo ldconfig
            
            # Create additional symlinks for ARM64 libraries
            sudo ln -sf /usr/lib/aarch64-linux-gnu/libz.so.1 /usr/lib/aarch64-linux-gnu/libz.so 2>/dev/null || true
            sudo ln -sf /usr/lib/aarch64-linux-gnu/libbz2.so.1.0 /usr/lib/aarch64-linux-gnu/libbz2.so.1 2>/dev/null || true
            sudo ln -sf /usr/lib/aarch64-linux-gnu/libbz2.so.1.0 /usr/lib/aarch64-linux-gnu/libbz2.so 2>/dev/null || true
            sudo ln -sf /usr/lib/aarch64-linux-gnu/liblzma.so.5 /usr/lib/aarch64-linux-gnu/liblzma.so 2>/dev/null || true
            sudo ln -sf /usr/lib/aarch64-linux-gnu/libzstd.so.1 /usr/lib/aarch64-linux-gnu/libzstd.so 2>/dev/null || true
            
            echo "ARM64 library symlinks created"
          fi
          
          # Run AppImage dependencies fix
          echo "Running AppImage dependencies fix..."
          bash script/fix-appimage-deps.sh || echo "Dependencies fix script failed, continuing..."
          
          # Set library path to include system libraries for electron-builder
          export LD_LIBRARY_PATH="/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:/usr/lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu:/usr/lib:/lib:$LD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH set to: $LD_LIBRARY_PATH"

          # Check current dist structure
          echo "Current dist content before packaging:"
          ls -la dist/ || echo "No dist directory yet"

          # Verify the packaged electron app exists
          echo "Checking packaged app structure:"
          ls -la "dist/github-desktop-linux-x64/" || echo "Packaged app directory not found"

          # Fix electron-builder yargs dependency chain issue
          echo "Fixing electron-builder dependency conflicts..."
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.resolutions = pkg.resolutions || {};
            pkg.resolutions['string-width'] = '^4.2.3';
            pkg.resolutions['yargs/string-width'] = '^4.2.3';
            pkg.resolutions['electron-builder/yargs/string-width'] = '^4.2.3';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          # Reinstall to apply resolutions
          echo "Reinstalling with dependency resolutions..."
          yarn install --ignore-scripts --force || true

          # Package using the TypeScript script (this will build both x64 and ARM64)
          echo "Running packaging script..."
          
          # Set environment variables for cross-compilation
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
          export STRIP_aarch64_unknown_linux_gnu=aarch64-linux-gnu-strip
          export PKG_CONFIG_PATH_aarch64_unknown_linux_gnu=/usr/lib/aarch64-linux-gnu/pkgconfig
          
          # Set target architecture environment for ARM64 libraries
          export TARGET_ARCH=multi
          export ELECTRON_BUILDER_ARCH=both
          
          if NODE_ENV=production yarn ts-node --transpile-only -P script/tsconfig.json script/package.ts; then
            echo "TypeScript packaging succeeded"
          else
            echo "TypeScript execution failed, trying alternative..."
            # Fallback to direct electron-builder execution
            echo "Installing specific electron-builder version..."
            npm install -g electron-builder@25.1.8 || true
            
            echo "Building packages with electron-builder..."
            echo "Current working directory: $(pwd)"
            echo "Config file exists: $(ls -la script/electron-builder-linux.yml || echo 'Config not found')"
            
            # Set ARM64 cross-compilation environment for electron-builder
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
            export AR=aarch64-linux-gnu-ar
            export STRIP=aarch64-linux-gnu-strip
            
            # Try building each target separately for better error isolation
            echo "Building AppImage packages..."
            npx electron-builder --linux AppImage --config script/electron-builder-linux.yml --publish=never || echo "AppImage build failed"
            
            echo "Building deb packages..."
            npx electron-builder --linux deb --config script/electron-builder-linux.yml --publish=never || echo "deb build failed"
            
            echo "Building rpm packages..."
            npx electron-builder --linux rpm --config script/electron-builder-linux.yml --publish=never || echo "rpm build failed"
            
            echo "Alternative packaging completed"
          fi

          # Verify packages were created and check sizes  
          echo "Packaging completed. Generated files:"
          ls -lha dist/ || echo "No dist files found"
          
          # List all files recursively to debug
          echo "All files in dist directory:"
          find dist/ -type f -name "*" 2>/dev/null || echo "Could not list dist files"
          
          # Check for specific package types
          echo "Looking for specific package types:"
          echo "AppImage files: $(find dist/ -name "*.AppImage" 2>/dev/null | wc -l)"
          echo "DEB files: $(find dist/ -name "*.deb" 2>/dev/null | wc -l)"
          echo "RPM files: $(find dist/ -name "*.rpm" 2>/dev/null | wc -l)"
          
          # Verify architecture naming consistency
          echo "Checking architecture naming consistency:"
          echo "Files with 'aarch64': $(find dist/ -name "*aarch64*" 2>/dev/null | wc -l)"
          echo "Files with 'arm64': $(find dist/ -name "*arm64*" 2>/dev/null | wc -l)"
          echo "Files with 'x64': $(find dist/ -name "*x64*" 2>/dev/null | wc -l)"
          echo "Files with 'amd64': $(find dist/ -name "*amd64*" 2>/dev/null | wc -l)"
          
          # Show specific architecture files
          echo "ARM64/aarch64 files:"
          find dist/ -name "*arm64*" -o -name "*aarch64*" 2>/dev/null || echo "No ARM64/aarch64 files found"
          echo "x64/amd64 files:"
          find dist/ -name "*x64*" -o -name "*amd64*" 2>/dev/null || echo "No x64/amd64 files found"

          # Verify architecture of generated binaries
          echo "Verifying binary architectures..."
          for f in dist/*.{deb,rpm,AppImage}; do
            if [ -f "$f" ]; then
              echo "Checking $f:"
              file "$f" || true
              
              # For AppImage, extract and check the main binary
              if [[ "$f" == *.AppImage ]]; then
                echo "Extracting AppImage to verify binary architecture and dependencies..."
                chmod +x "$f"
                "$f" --appimage-extract >/dev/null 2>&1 || true
                if [ -f "squashfs-root/github-desktop" ]; then
                  echo "Main binary architecture:"
                  file squashfs-root/github-desktop || true
                  readelf -h squashfs-root/github-desktop | grep -E "(Class|Machine)" || true
                  
                  # Detect if this is ARM64 AppImage
                  if file squashfs-root/github-desktop | grep -q "aarch64"; then
                    echo "ARM64 AppImage detected - checking ARM64 library dependencies..."
                    
                    # For ARM64, we need to use qemu-aarch64 to run ldd properly
                    if command -v qemu-aarch64 >/dev/null 2>&1; then
                      echo "Using qemu-aarch64 to check ARM64 dependencies:"
                      qemu-aarch64 -L /usr/aarch64-linux-gnu /lib/aarch64-linux-gnu/ld-linux-aarch64.so.1 --list squashfs-root/github-desktop | grep -E "(libz|zlib)" || echo "libz.so not found in ARM64 dependencies"
                    else
                      echo "qemu-aarch64 not available, cannot check ARM64 runtime dependencies"
                      echo "Checking if ARM64 libraries are bundled in AppImage:"
                      find squashfs-root -name "*aarch64*" -o -name "*arm64*" | head -10 || echo "No ARM64 specific paths found"
                    fi
                  else
                    echo "x64 AppImage detected - checking x64 library dependencies..."
                    # Check for critical library dependencies
                    echo "Checking for libz.so dependency in AppImage:"
                    ldd squashfs-root/github-desktop | grep -E "(libz|zlib)" || echo "libz.so not found in dependencies"
                  fi
                  
                  # List bundled libraries in AppImage
                  echo "Bundled libraries in AppImage:"
                  find squashfs-root -name "*.so*" | grep -E "(libz|zlib|libbz2|liblzma|libzstd)" || echo "No compression libraries found bundled"
                  
                  # Check lib directories in AppImage
                  echo "Library directories in AppImage:"
                  find squashfs-root -type d -name "*lib*" | head -10 || echo "No lib directories found"
                fi
                rm -rf squashfs-root 2>/dev/null || true
              fi
            fi
          done

          # Size sanity check - packages should be > 100MB
          for f in dist/*.{deb,rpm,AppImage}; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo "0")
              size_mb=$((size / 1024 / 1024))
              echo "Package $f: ${size_mb}MB"
              if [ "$size_mb" -lt 100 ]; then
                echo "WARNING: Package $f is only ${size_mb}MB, which seems too small!"
              fi
            fi
          done
        env:
          NODE_ENV: production
          SKIP_POSTINSTALL: 1

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        if:
          ${{ inputs.upload-artifacts != false || github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' }}
        with:
          name: github-desktop-linux-deb
          path: |
            dist/*.deb
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload .rpm packages
        uses: actions/upload-artifact@v4
        if:
          ${{ inputs.upload-artifacts != false || github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' }}
        with:
          name: github-desktop-linux-rpm
          path: |
            dist/*.rpm
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload AppImages
        uses: actions/upload-artifact@v4
        if:
          ${{ inputs.upload-artifacts != false || github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' }}
        with:
          name: github-desktop-linux-appimage
          path: |
            dist/*.AppImage
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload all Linux packages
        uses: actions/upload-artifact@v4
        if:
          ${{ inputs.upload-artifacts != false || github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' }}
        with:
          name: github-desktop-linux-all-packages
          path: |
            dist/GitHubDesktop-*
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        if:
          ${{ inputs.upload-artifacts != false || github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' }}
        with:
          name: github-desktop-linux-checksums
          path: |
            dist/*.sha256
            dist/checksums.txt
          retention-days: 30
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [lint, build-linux]
    runs-on: ubuntu-latest
    if:
      ${{ github.event_name == 'push' || github.event_name ==
      'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist-artifacts

      - name: Display downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find ./dist-artifacts -type f -ls

      - name: Set version and build number
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Release from tag
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "RELEASE_TAG=v${VERSION}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=GitHub Desktop for Linux v${VERSION}" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            # Development build
            SHORT_SHA=$(git rev-parse --short HEAD)
            BUILD_NUMBER="${{ github.run_number }}"
            VERSION="dev-build-${BUILD_NUMBER}-${SHORT_SHA}"
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "RELEASE_TAG=dev-${BUILD_NUMBER}" >> $GITHUB_OUTPUT
            echo "RELEASE_NAME=GitHub Desktop for Linux (Development Build #${BUILD_NUMBER})" >> $GITHUB_OUTPUT
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
            echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi
          echo "Building release for version: ${VERSION}"

      - name: Calculate checksums
        run: |
          cd dist-artifacts
          echo "# Checksums for GitHub Desktop for Linux ${{ steps.vars.outputs.VERSION }}" > checksums.md
          echo "" >> checksums.md
          echo "| File | Architecture | MD5 | SHA256 |" >> checksums.md
          echo "|------|--------------|-----|--------|" >> checksums.md

          # Process all files and detect architecture from filename
          for dir in */; do
            cd "$dir"
            for file in *.{deb,rpm,AppImage,tar.gz}; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                md5_hash=$(md5sum "$file" | cut -d ' ' -f 1)
                sha256_hash=$(sha256sum "$file" | cut -d ' ' -f 1)
                
                # Detect architecture from filename
                if [[ "$filename" == *"amd64"* ]] || [[ "$filename" == *"x86_64"* ]]; then
                  arch="x64"
                elif [[ "$filename" == *"arm64"* ]] || [[ "$filename" == *"aarch64"* ]]; then
                  arch="ARM64"
                else
                  arch="unknown"
                fi
                
                echo "| [$filename](https://github.com/${{ github.repository }}/releases/download/${{ steps.vars.outputs.RELEASE_TAG }}/$filename) | $arch | \`$md5_hash\` | \`$sha256_hash\` |" >> ../checksums.md
              fi
            done
            cd ..
          done

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.vars.outputs.RELEASE_TAG }}
          release_name: ${{ steps.vars.outputs.RELEASE_NAME }}
          draft: false
          prerelease: ${{ steps.vars.outputs.IS_PRERELEASE }}
          body: |
            GitHub Desktop for Linux ${{ steps.vars.outputs.VERSION }}

            This release includes packages for both x64 and ARM64 architectures.

            ## Installation

            ### Debian/Ubuntu (.deb)
            Download the appropriate .deb file for your architecture:
            - **x64**: GitHubDesktop-*-amd64.deb
            - **ARM64**: GitHubDesktop-*-arm64.deb

            Install with:
            ```bash
            sudo apt install ./GitHubDesktop-*.deb
            ```

            ### Red Hat/Fedora (.rpm)
            Download the appropriate .rpm file for your architecture:
            - **x64**: GitHubDesktop-*-x86_64.rpm
            - **ARM64**: GitHubDesktop-*-aarch64.rpm

            Install with:
            ```bash
            sudo rpm -i GitHubDesktop-*.rpm
            ```

            ### AppImage (Universal)
            Download the appropriate AppImage file for your architecture:
            - **x64**: GitHubDesktop-*-x86_64.AppImage
            - **ARM64**: GitHubDesktop-*-arm64.AppImage

            Make executable and run:
            ```bash
            chmod +x GitHubDesktop-*.AppImage
            ./GitHubDesktop-*.AppImage
            ```

            ## Architecture Detection
            To determine your system architecture, run:
            ```bash
            uname -m
            ```
            - `x86_64` or `amd64` → use x64 packages
            - `aarch64` or `arm64` → use ARM64 packages

      - name: Find and upload release assets
        run: |
          cd dist-artifacts
          
          # Find all package files
          find . -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" | while read file; do
            if [ -f "$file" ]; then
              asset_name=$(basename "$file")
              echo "Uploading: $asset_name"
              
              # Determine content type
              case "$asset_name" in
                *.deb)
                  content_type="application/vnd.debian.binary-package"
                  ;;
                *.rpm)
                  content_type="application/x-rpm"
                  ;;
                *.AppImage)
                  content_type="application/x-executable"
                  ;;
                *)
                  content_type="application/octet-stream"
                  ;;
              esac
              
              # Upload using GitHub CLI (more reliable than actions)
              if command -v gh >/dev/null 2>&1; then
                gh release upload "${{ steps.vars.outputs.RELEASE_TAG }}" "$file" --clobber || true
              else
                echo "GitHub CLI not available, asset upload may fail"
              fi
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload checksums to release
        if: hashFiles('./dist-artifacts/checksums.md')
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh release upload "${{ steps.vars.outputs.RELEASE_TAG }}" "./dist-artifacts/checksums.md" --clobber || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
