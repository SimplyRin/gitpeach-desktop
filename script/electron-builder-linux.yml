artifactName: 'RinGitPeachDesktop-${os}-${arch}-${version}.${ext}'
directories:
  output: 'dist'
linux:
  category: 'GNOME;GTK;Development'
  packageCategory: 'GNOME;GTK;Development'
  icon: 'app/static/linux/logos'
  mimeTypes:
    - x-scheme-handler/x-github-client
    - x-scheme-handler/x-github-desktop-auth
    # workaround for handling OAuth flow until we figure out what we're doing
    # With the development OAuth details
    # see https://github.com/shiftkey/desktop/issues/72 for more details
    - x-scheme-handler/x-github-desktop-dev-auth
  target:
    - target: deb
      arch:
        - x64
        - arm64
    - target: snap
      arch:
        - x64
  maintainer: 'SimplyRin <contact@simplyrin.net>'
  executableName: 'rin-gitpeach-desktop'
  extraFiles:
    - from: 'script/resources/rin-gitpeach-desktop.desktop'
      to: 'usr/share/applications/rin-gitpeach-desktop.desktop'
    - from: 'app/static/linux/logos/32x32.png'
      to: 'usr/share/icons/hicolor/32x32/apps/rin-gitpeach-desktop.png'
    - from: 'app/static/linux/logos/64x64.png'
      to: 'usr/share/icons/hicolor/64x64/apps/rin-gitpeach-desktop.png'
    - from: 'app/static/linux/logos/128x128.png'
      to: 'usr/share/icons/hicolor/128x128/apps/rin-gitpeach-desktop.png'
    - from: 'app/static/linux/logos/256x256.png'
      to: 'usr/share/icons/hicolor/256x256/apps/rin-gitpeach-desktop.png'
    - from: 'app/static/linux/logos/512x512.png'
      to: 'usr/share/icons/hicolor/512x512/apps/rin-gitpeach-desktop.png'
    # Add scalable SVG icon if available, or additional PNG icon for better compatibility
    - from: 'app/static/linux/logos/1024x1024.png'
      to: 'usr/share/icons/hicolor/1024x1024/apps/rin-gitpeach-desktop.png'
    # Additional icon for pixmaps directory (for older systems)
    - from: 'app/static/linux/logos/64x64.png'
      to: 'usr/share/pixmaps/rin-gitpeach-desktop.png'
    # Ubuntu 24.04 Yaru theme compatibility
    - from: 'app/static/linux/logos/64x64.png'
      to: 'usr/share/icons/Yaru/64x64/apps/rin-gitpeach-desktop.png'
    - from: 'app/static/linux/logos/64x64.png'
      to: 'usr/share/icons/Yaru/48x48/apps/rin-gitpeach-desktop.png'

deb:
  depends:
    - git
    - libsecret-1-0
    - libxss1
    - libnss3
    - libasound2t64 | libasound2
    - zlib1g
    - libbz2-1.0
    - liblzma5
    - desktop-file-utils
    - shared-mime-info
  afterInstall: 'script/linux-after-install.sh'
  afterRemove: 'script/linux-after-remove.sh'
  packageCategory: 'GNOME;GTK;Development'
  fpm:
    - '--deb-recommends=xdg-utils'
    - '--deb-recommends=desktop-file-utils'

snap:
  category: 'Development'
  summary: 'Git Peach Desktop - Simple Git collaboration from your desktop'
  description: |
    Git Peach Desktop is a powerful Git client that makes version control 
    accessible and intuitive for everyone. Features include:

    * Visual Git workflow
    * GitHub integration 
    * Branch management
    * Conflict resolution
    * Commit history visualization
    * Pull request support

    Perfect for developers who want a beautiful graphical interface for Git operations.
  grade: 'stable'
  confinement: 'strict'
  base: 'core22'
  stagePackages:
    - git
    - git-lfs
    - openssh-client
    - libnss3
    - libxss1
    - libxtst6
    - libxrandr2
    - libasound2
    - libpangocairo-1.0-0
    - libatk1.0-0
    - libcairo-gobject2
    - libgtk-3-0
    - libgdk-pixbuf2.0-0
    - libdrm2
    - libxcomposite1
    - libxdamage1
    - libxfixes3
    - zlib1g
    - libbz2-1.0
    - liblzma5
    - libzstd1
  plugs:
    - network
    - network-bind
    - home
    - removable-media
    - desktop
    - desktop-legacy
    - wayland
    - x11
    - unity7
    - audio-playback
    - pulseaudio
    - gsettings
    - opengl
    - ssh-keys
    - password-manager-service
    - system-observe
    - hardware-observe
  environment:
    DISABLE_WAYLAND: 1
    ELECTRON_TRASH: gio
