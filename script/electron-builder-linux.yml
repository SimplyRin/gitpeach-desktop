artifactName: 'GitHubDesktop-${os}-${arch}-${version}.${ext}'
directories:
  output: 'dist'
linux:
  category: 'GNOME;GTK;Development'
  packageCategory: 'GNOME;GTK;Development'
  icon: 'app/static/linux/logos'
  mimeTypes:
    - x-scheme-handler/x-github-client
    - x-scheme-handler/x-github-desktop-auth
    # workaround for handling OAuth flow until we figure out what we're doing
    # With the development OAuth details
    # see https://github.com/shiftkey/desktop/issues/72 for more details
    - x-scheme-handler/x-github-desktop-dev-auth
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  maintainer: 'GitHub Desktop Linux <noreply@github.com>'
  executableName: 'github-desktop'
  extraFiles:
    - from: 'script/resources/github-desktop.desktop'
      to: 'usr/share/applications/github-desktop.desktop'
    - from: 'app/static/linux/logos/32x32.png'
      to: 'usr/share/icons/hicolor/32x32/apps/github-desktop.png'
    - from: 'app/static/linux/logos/64x64.png'
      to: 'usr/share/icons/hicolor/64x64/apps/github-desktop.png'
    - from: 'app/static/linux/logos/128x128.png'
      to: 'usr/share/icons/hicolor/128x128/apps/github-desktop.png'
    - from: 'app/static/linux/logos/256x256.png'
      to: 'usr/share/icons/hicolor/256x256/apps/github-desktop.png'
    - from: 'app/static/linux/logos/512x512.png'
      to: 'usr/share/icons/hicolor/512x512/apps/github-desktop.png'

appImage:
  # systemIntegration is deprecated in newer versions
  artifactName: 'GitHubDesktop-${os}-${arch}-${version}.${ext}'

deb:
  depends:
    - git
    - libsecret-1-0
    - libxss1
    - libnss3
    - libasound2
    - zlib1g
    - libbz2-1.0
    - liblzma5
  afterInstall: 'script/linux-after-install.sh'
  afterRemove: 'script/linux-after-remove.sh'
  packageCategory: 'GNOME;GTK;Development'

rpm:
  depends:
    - git
    - libsecret
    - libXScrnSaver
    - nss
    - alsa-lib
    - zlib
    - bzip2-libs
    - xz-libs
  afterInstall: 'script/linux-after-install.sh'
  afterRemove: 'script/linux-after-remove.sh'
  packageCategory: 'GNOME;GTK;Development'
