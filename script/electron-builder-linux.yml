artifactName: 'GitHubDesktop-${os}-${arch}-${version}.${ext}'
directories:
  output: 'dist'
linux:
  category: 'Development;IDE;VCS'
  packageCategory: 'Development;IDE;VCS'
  icon: 'app/static/linux/logos'
  synopsis: 'Simple collaboration from your desktop'
  description: 'GitHub Desktop is a seamless way to contribute to projects on GitHub and GitHub Enterprise. This cross-platform desktop application simplifies your Git workflow.'
  desktop:
    Name: 'GitHub Desktop'
    GenericName: 'Git client'
    Comment: 'Simple collaboration from your desktop'
    Type: Application
    Categories: 'Development;IDE;VCS;'
    StartupNotify: true
    StartupWMClass: 'github-desktop'
    Keywords: 'git;github;version control;development;'
    MimeType: 'x-scheme-handler/x-github-client;x-scheme-handler/x-github-desktop-auth;x-scheme-handler/x-github-desktop-dev-auth;'
  executableName: 'github-desktop'
  mimeTypes:
    - x-scheme-handler/x-github-client
    - x-scheme-handler/x-github-desktop-auth
    # workaround for handling OAuth flow until we figure out what we're doing
    # With the development OAuth details
    # see https://github.com/shiftkey/desktop/issues/72 for more details
    - x-scheme-handler/x-github-desktop-dev-auth
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  maintainer: 'GitHub Desktop Linux <noreply@github.com>'

appImage:
  # systemIntegration is deprecated in newer versions
  artifactName: 'GitHubDesktop-${os}-${arch}-${version}.${ext}'

deb:
  depends:
    - git
    - libsecret-1-0
    - libxss1
    - libnss3
    - libasound2
    - zlib1g
    - libbz2-1.0
    - liblzma5
  afterInstall: 'script/linux-after-install.sh'
  afterRemove: 'script/linux-after-remove.sh'
  packageCategory: 'Development'
  priority: 'optional'
  section: 'devel'

rpm:
  depends:
    - git
    - libsecret
    - libXScrnSaver
    - nss
    - alsa-lib
    - zlib
    - bzip2-libs
    - xz-libs
  afterInstall: 'script/linux-after-install.sh'
  afterRemove: 'script/linux-after-remove.sh'
  packageCategory: 'GNOME;GTK;Development'
